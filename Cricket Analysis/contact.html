<!DOCTYPE html>
<html>
<head>
<title>Contact - Cricket Dashboard</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}

header{background:#1e3c72;color:white;padding:15px;text-align:center;}

.contact{
max-width:500px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#1e3c72;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
}

footer{
background:#1e3c72;
color:white;
text-align:center;
padding:15px;
}
</style>
</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<div class="contact">

<form>
<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Message</label>
<textarea rows="5" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>
</form>

</div>

<footer>
© 2025 Cricket Dashboard
</footer>

</body>
</html>
