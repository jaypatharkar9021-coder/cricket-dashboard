<!DOCTYPE html>
<html>
<head>
<title>Teams - Cricket Dashboard</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}

header{background:#1e3c72;color:white;padding:15px;text-align:center;}

.teams{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

footer{
background:#1e3c72;
color:white;
text-align:center;
padding:15px;
}
</style>
</head>

<body>

<header>
<h1>International Cricket Teams</h1>
</header>

<section class="teams">

<div class="card">
<h3>India</h3>
<p>World Cup Wins: 2</p>
</div>

<div class="card">
<h3>Australia</h3>
<p>World Cup Wins: 6</p>
</div>

<div class="card">
<h3>England</h3>
<p>World Cup Wins: 1</p>
</div>

<div class="card">
<h3>Pakistan</h3>
<p>World Cup Wins: 1</p>
</div>

</section>

<footer>
© 2025 Cricket Dashboard
</footer>

</body>
</html>
